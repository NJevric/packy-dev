<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- Subtle top border -->
  <rect x="0" y="0" width="900" height="1" fill="#222222"/>

  <!-- Left column: terminal snippet -->
  <rect x="52" y="52" width="340" height="140" rx="8" fill="#161616" stroke="#222222" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="52" y="52" width="340" height="32" rx="8" fill="#1c1c1c"/>
  <rect x="52" y="68" width="340" height="16" fill="#1c1c1c"/>
  <circle cx="76" cy="68" r="5" fill="#333333"/>
  <circle cx="96" cy="68" r="5" fill="#333333"/>
  <circle cx="116" cy="68" r="5" fill="#333333"/>

  <!-- Terminal lines -->
  <text x="72" y="107" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="12" fill="#555555">$</text>
  <text x="85" y="107" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="12" fill="#e5e5e5">packy</text>

  <text x="72" y="128" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="11" fill="#3a3a3a">Server running at</text>
  <text x="72" y="144" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="11" fill="#737373">http://localhost:5173</text>

  <text x="72" y="165" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="11" fill="#3a3a3a">Watching</text>
  <text x="134" y="165" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="11" fill="#737373">package.json</text>

  <rect x="72" y="176" width="6" height="11" rx="1" fill="#555555"/>

  <!-- Divider -->
  <line x1="440" y1="52" x2="440" y2="192" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Right column: branding -->
  <text x="476" y="108" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1.5">packy</text>

  <text x="477" y="133" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#555555" letter-spacing="0.2">Browser UI for npm package management</text>

  <!-- Thin rule -->
  <line x1="477" y1="150" x2="848" y2="150" stroke="#222222" stroke-width="1"/>

  <!-- Feature list — plain text, no pills -->
  <text x="477" y="170" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#444444">Install · Update · Remove · Audit · npm / yarn / pnpm</text>

  <!-- Install command -->
  <text x="477" y="194" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="11" fill="#333333">npm install -g packy</text>
</svg>
